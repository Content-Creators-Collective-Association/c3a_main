<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Profile Form Example</title>
</head>
<body>
  <form onsubmit="handleSubmit(event)">
    <input type="text" name="full_name" placeholder="Full Name" required />
    <input type="text" name="address" placeholder="Address" required />
    <input type="number" name="age" placeholder="Age" required />
    <input type="text" name="nationality" placeholder="Nationality" required />
    <input type="text" name="profile_links" placeholder="Profile Links" required />

    <select name="social_platform" required>
      <option value="Instagram">Instagram</option>
      <option value="YouTube">YouTube</option>
      <option value="LinkedIn">LinkedIn</option>
      <option value="TikTok">TikTok</option>
    </select>

    <input type="number" name="follower_count" placeholder="Follower Count" required />

    <select name="content_type" required>
      <option value="Lifestyle">Lifestyle</option>
      <option value="Education">Education</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Tech">Tech</option>
    </select>

    <button type="submit">Submit</button>
  </form>

  <!-- Ensure your built bundle includes src/lib/handleSubmit.js so window.handleSubmit is available -->
</body>
</html>
